<div class="pagination-wrapper" *ngIf="totalPages > 0">
  <div class="pagination-info">
    <span class="items-range" *ngIf="totalItems > 0">
      {{ startItem }}-{{ endItem }} sur {{ totalItems }} élément{{ totalItems > 1 ? 's' : '' }}
    </span>
    <span class="page-info">
      Page {{ currentPage }} / {{ totalPages }}
    </span>
  </div>
  
  <div class="pagination-controls">
    <button 
      class="btn btn-pagination" 
      [disabled]="!hasPrevious || loading"
      (click)="previousPage()"
      title="Page précédente">
      <lucide-icon name="chevron-left" [size]="16"></lucide-icon>
      <span class="btn-text">Précédent</span>
    </button>
    
    <div class="page-numbers" *ngIf="totalPages > 1">
      <button 
        *ngFor="let page of getPageNumbers()"
        class="btn btn-page-number"
        [class.active]="page === currentPage"
        [disabled]="loading"
        (click)="goToPage(page)">
        {{ page }}
      </button>
    </div>
    
    <button 
      class="btn btn-pagination" 
      [disabled]="!hasNext || loading"
      (click)="nextPage()"
      title="Page suivante">
      <span class="btn-text">Suivant</span>
      <lucide-icon name="chevron-right" [size]="16"></lucide-icon>
    </button>
  </div>
</div>
