server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Angular app and fallback to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets can be cached aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri $uri/ /index.html;
    }

    # Optional: basic error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
