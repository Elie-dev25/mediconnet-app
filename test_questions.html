<!DOCTYPE html>
<html>
<head>
    <title>Test Questions Gynécologie</title>
</head>
<body>
    <h1>Test des questions prédéfinies pour la gynécologie</h1>
    
    <div id="result"></div>
    
    <script>
        // Test de l'index
        fetch('/assets/data/questions/index.json')
            .then(response => response.json())
            .then(data => {
                console.log('Index:', data);
                document.getElementById('result').innerHTML += '<h2>Index chargé:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                // Test des questions gynécologie
                const gynecologie = data.specialites.find(s => s.id === 23);
                if (gynecologie) {
                    console.log('Gynécologie trouvée:', gynecologie);
                    
                    // Charger firstconsult
                    return fetch(`/assets/data/questions/${gynecologie.key}/firstconsult.json`);
                } else {
                    throw new Error('Spécialité gynécologie (ID 23) non trouvée');
                }
            })
            .then(response => response.json())
            .then(data => {
                console.log('Questions première consultation:', data);
                document.getElementById('result').innerHTML += '<h2>Questions première consultation:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                console.error('Erreur:', error);
                document.getElementById('result').innerHTML += '<h2>Erreur:</h2><pre>' + error.message + '</pre>';
            });
    </script>
</body>
</html>
