events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Compression des réponses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Protection basique : masquer la version de Nginx
    server_tokens off;

    # Limite la taille des uploads (doit correspondre à ton backend : 50MB)
    client_max_body_size 50M;

    server {
        listen 80;

        # -------------------------------------------------------
        # API Backend → toutes les requêtes commençant par /api/
        # -------------------------------------------------------
        location /api/ {
            proxy_pass         http://mediconnet-backend:8080;
            proxy_http_version 1.1;

            # Headers nécessaires pour que le backend sache l'IP réelle du client
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeout généreux pour les uploads de documents (50MB)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # WebSockets SignalR (notifications)
        location /hubs/ {
            proxy_pass http://mediconnet-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # -------------------------------------------------------
        # Health check du backend (utilisé par Docker)
        # -------------------------------------------------------
        location /health {
            proxy_pass http://mediconnet-backend:8080/health;
        }

        # -------------------------------------------------------
        # Frontend Angular → tout le reste
        # -------------------------------------------------------
        location / {
            proxy_pass         http://mediconnet-frontend:80;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}