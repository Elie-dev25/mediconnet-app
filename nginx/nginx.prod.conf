events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
    
    # Protection : masquer la version de Nginx
    server_tokens off;
    
    # Limite taille uploads (50MB)
    client_max_body_size 50M;
    
    # Redirection HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
    
    # Serveur HTTPS principal
    server {
        listen 443 ssl http2;
        server_name mediconnet.com;  # ← À remplacer par ton domaine
        
        # Certificats SSL (Let's Encrypt)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Configuration SSL sécurisée
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Headers sécurité
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # API Backend
        location /api/ {
            proxy_pass         http://mediconnet-backend:8080;
            proxy_http_version 1.1;
            
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
        
        # Health check
        location /health {
            proxy_pass http://mediconnet-backend:8080/health;
        }
        
        # Frontend Angular
        location / {
            proxy_pass         http://mediconnet-frontend:80;
            proxy_http_version 1.1;
            
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
