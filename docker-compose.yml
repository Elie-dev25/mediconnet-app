services:
  mediconnet-db:
    image: mysql:8.0
    container_name: mediconnet-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # ⚠️ Port 3306 retiré : la base n'est plus accessible de l'extérieur
    # Pour accéder à MySQL depuis ton PC : SSH tunnel (voir README)
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mediconnet-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mediconnet-backend:
    build:
      context: ./Mediconnet-Backend
      dockerfile: Dockerfile
    container_name: mediconnet-backend
    env_file:
      - .env
    # ⚠️ Ports retirés : le backend n'est plus accessible directement de l'extérieur
    # Seul Nginx peut lui parler (via le réseau interne Docker)
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};OldGuids=true;
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - EmailSettings__SmtpServer=${EMAIL_SMTP_SERVER}
      - EmailSettings__SmtpPort=${EMAIL_SMTP_PORT}
      - EmailSettings__UseSsl=${EMAIL_USE_SSL}
      - EmailSettings__SenderEmail=${EMAIL_SENDER_EMAIL}
      - EmailSettings__SenderName=${EMAIL_SENDER_NAME}
      - EmailSettings__EnableEmailConfirmation=true
      - EmailSettings__TokenExpirationHours=24
      - EmailSettings__DevMode=false
      # URLs mises à jour : tout passe par Nginx maintenant
      - AppSettings__FrontendUrl=${FRONTEND_URL:-http://0.0.0.0:80}
      - AppSettings__ApiUrl=${API_URL:-http://0.0.0.0:80/api}
      - DocumentStorage__RootPath=/storage/mediConnect
      - DocumentStorage__MaxFileSizeBytes=52428800
    volumes:
      - ./storage:/storage/mediConnect
    depends_on:
      mediconnet-db:
        condition: service_healthy
    networks:
      - mediconnet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mediconnet-frontend:
    build:
      context: ./Mediconnet-Frontend
      dockerfile: Dockerfile
    container_name: mediconnet-frontend
    # ⚠️ Port retiré : le frontend n'est plus accessible directement de l'extérieur
    depends_on:
      - mediconnet-backend
    networks:
      - mediconnet-network
    restart: unless-stopped

  # -------------------------------------------------------
  # NGINX — Reverse proxy (seul point d'entrée public)
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: mediconnet-nginx
    ports:
      - "80:80"      # HTTP (sera remplacé par 443 quand tu auras un domaine)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mediconnet-backend
      - mediconnet-frontend
    networks:
      - mediconnet-network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: mediconnet-adminer
    # ⚠️ Port retiré : Adminer n'est plus accessible de l'extérieur
    # Pour y accéder : SSH tunnel (voir README)
    depends_on:
      - mediconnet-db
    networks:
      - mediconnet-network
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mediconnet-db

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mediconnet-mailhog
    # ⚠️ Ports retirés : MailHog n'est plus accessible de l'extérieur
    # Pour y accéder : SSH tunnel (voir README)
    networks:
      - mediconnet-network
    restart: unless-stopped

networks:
  mediconnet-network:
    driver: bridge

volumes:
  mysql_data:
  document_storage: